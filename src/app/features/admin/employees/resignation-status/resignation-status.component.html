<div class="page-content">

  <div class="row">

    <div class="col-12 col-sm-12 col-md-12 col-lg-9 col-xl-9 col-xxl-9">

      <div class="card">
        <div class="card-body p-3">
          <div class="table-responsive">
            <table class="table resignation-table" appDatatable [rowsPerPage]="10">
              <thead>
                <tr>
                  <th>Employee ID</th>
                  <th>Employee Name</th>
                  <th>Status</th>
                  <th>Initiated Date</th>
                  <th>Status Timeline</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let row of resignations">
                  <td>{{ row.employeeId }}</td>
                  <td>{{ row.employeeName }}</td>
                  <td>
                    <span class="status-badge" [class.status-approved]="row.status === 'Approved'"
                      [class.status-pending]="row.status === 'Pending'">
                      {{ row.status }}
                    </span>
                  </td>
                  <td>{{ row.initiatedDate }}</td>
                  <td>
                    <a href="javascript:void(0)" class="link-view" (click)="onViewTimeline(row)">
                      <i class="bi bi-eye"></i> View
                    </a>
                  </td>
                </tr>
                <tr *ngIf="resignations.length === 0">
                  <td colspan="5" class="text-center no-data">No data available</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
