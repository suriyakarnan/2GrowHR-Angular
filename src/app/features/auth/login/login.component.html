<div class="login-sef">
  <div class="container">
    <div class="row login-box">

      <!-- ═══════════════════════════════════════════════════
           LEFT PANEL — Slider
      ════════════════════════════════════════════════════ -->
      <div class="col-lg-8 col-md-12 bg-img align-self-center order2mobile">

        <!-- Social Icons -->
        <div class="social-links">
          <a href="https://www.youtube.com/channel/UCqf3dsXj_e9Xs-t00hxFOHw" class="youtube">
            <img src="/Assets/NewLoginPage/img/youtube.svg" width="18" height="18" alt="youtube">
          </a>
          <a href="https://www.linkedin.com/company/81501910/admin/feed/posts/" class="linkedin">
            <img src="/Assets/NewLoginPage/img/linkedin.svg" width="18" height="18" alt="linkedin">
          </a>
          <a href="https://www.instagram.com/2growhr/" class="instagram">
            <img src="/Assets/NewLoginPage/img/instagram.svg" width="18" height="18" alt="instagram">
          </a>
        </div>

        <!-- Arrows -->
        <button class="slider-arrow left-arrow" (click)="prevSlide()">&#10094;</button>
        <button class="slider-arrow right-arrow" (click)="nextSlide()">&#10095;</button>

        <!-- Slider Content -->
        <div class="left-content">

          <h3 class="site-title">
            www.
            <span [ngClass]="slides[currentIndex].websiteClass">
              {{ slides[currentIndex].website }}
            </span>
            {{ slides[currentIndex].domain }}
          </h3>

          <div class="banner-placeholder">

            <!-- OLD IMAGE (animating out) -->
            <img
              *ngIf="oldImageAnimation"
              [src]="slides[previousIndex].image"
              class="banner-img"
              [ngClass]="oldImageAnimation">

            <!-- NEW IMAGE (animating in) -->
            <img
              [src]="slides[currentIndex].image"
              class="banner-img"
              [ngClass]="newImageAnimation">

          </div>

          <h2 class="product-title">{{ slides[currentIndex].title }}</h2>
          <p class="product-desc">{{ slides[currentIndex].desc }}</p>

          <button class="learn-btn" [style.background]="slides[currentIndex].buttonColor">
            Learn More
          </button>

        </div>

        <!-- Dots -->
        <div class="slider-dots">
          <span
            *ngFor="let slide of slides; let i = index"
            [class.active]="i === currentIndex">
          </span>
        </div>

      </div>

      <!-- ═══════════════════════════════════════════════════
           RIGHT PANEL — Login Form
      ════════════════════════════════════════════════════ -->
      <div class="col-lg-4 col-md-12 bg-color-16 align-self-center">
        <div class="login-content">

          <!-- Logo -->
          <div class="logo-placeholder">
            <img class="mb-2" src="/Assets/NewLoginPage/img/2growhr-logo.svg"
              width="148" height="39" alt="2GrowHR">
          </div>

          <h4 class="signin-title">Sign in to access your account</h4>

          <!-- Username -->
          <div class="form-group form-box mb-3">
            <input
              type="text"
              class="form-control input-text"
              placeholder="Username"
              [(ngModel)]="username"
              (keyup.enter)="login()">
            <i class="bi bi-person input-icon"></i>
          </div>

          <!-- Password -->
          <div class="form-group form-box mb-3">
            <input
              [type]="showPassword ? 'text' : 'password'"
              class="form-control input-text"
              placeholder="Password"
              [(ngModel)]="password"
              (keyup.enter)="login()">
            <i class="bi bi-lock input-icon"></i>
            <img
              [src]="showPassword
                ? '/Assets/NewLoginPage/img/eye-crossed.svg'
                : '/Assets/NewLoginPage/img/eye.svg'"
              class="password-icon"
              alt="toggle password"
              (click)="showPassword = !showPassword">
          </div>

          <!-- Error Message -->
          <div class="error-msg mb-3" *ngIf="errorMessage">
            <i class="bi bi-exclamation-circle me-1"></i>
            {{ errorMessage }}
          </div>

          <!-- Forgot Password -->
          <a href="#" class="forgot-link">Forgot Password or Username?</a>

          <!-- Login Button -->
          <button
            type="button"
            class="login-btn"
            (click)="login()"
            [disabled]="isLoading">
            <span *ngIf="!isLoading">LOGIN</span>
            <span *ngIf="isLoading">
              <span class="spinner-border spinner-border-sm me-2"></span>
              Signing in...
            </span>
          </button>

          <!-- 🚧 TEMPORARY — remove before production -->
          <button
            type="button"
            (click)="testAsAdmin()"
            style="margin-top: 10px; width: 100%; background: #ffa500; color: white; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;">
            🚧 Test as Admin (Dev Only)
          </button>

          <div class="trusted-text">"TRUSTED BY MORE THAN 200000+ USERS GLOBALLY"</div>

          <div class="powered-text">
            POWERED BY <span>SANeFORCE</span>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
