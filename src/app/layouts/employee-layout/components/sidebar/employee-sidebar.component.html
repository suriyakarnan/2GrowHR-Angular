<!-- Mobile Toggle Button -->
<div class="mobile-header">
    <button class="mobile-toggle-btn" (click)="toggleMobileMenu()" [class.active]="isMobileMenuOpen"
        aria-label="Toggle menu">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
    </button>
    <img src="/Assets/NewLoginPage/img/new-logo.png" alt="Logo" class="mobile-header-logo">
</div>

<div class="sidebar-overlay" *ngIf="isMobileMenuOpen" (click)="closeMobileMenu()"></div>
